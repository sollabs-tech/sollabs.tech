# Build the Astro marketing site and deploy it to GitHub Pages.

name: pages

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: install
        working-directory: website
        run: npm ci
      - name: build
        working-directory: website
        env:
          PUBLIC_REPO_URL: https://github.com/sollabs-tech/sollabs.tech
          PUBLIC_SITE_URL: https://sollabs.tech
          PUBLIC_BASE_PATH: /
          PUBLIC_PLAUSIBLE_DOMAIN: sollabs.tech
          PUBLIC_CAL_URL: ${{ vars.CAL_URL }}
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
